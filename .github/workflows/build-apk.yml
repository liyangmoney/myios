name: Build Android APK

on:
  push:
    branches: [ main, master ]
    paths:
      - 'frontend/**'
      - '.github/workflows/build-apk.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'frontend/**'
  workflow_dispatch:
    inputs:
      release:
        description: 'Create release?'
        required: false
        default: 'false'
      version:
        description: 'Version name (e.g., 1.0.0)'
        required: false
        default: ''

env:
  CACHE_VERSION: 1

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'frontend/package-lock.json'

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Cache Gradle dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Install dependencies
      run: npm ci

    - name: Build frontend
      run: npm run build

    - name: Sync Capacitor
      run: npx cap sync android

    - name: Grant execute permission for gradlew
      run: chmod +x android/gradlew

    - name: Build Debug APK
      run: |
        cd android
        ./gradlew assembleDebug --no-daemon

    - name: Rename APK with version
      run: |
        VERSION=${{ github.event.inputs.version || github.sha }}
        VERSION_SHORT=$(echo $VERSION | cut -c1-7)
        mkdir -p ./output
        cp ./android/app/build/outputs/apk/debug/app-debug.apk ./output/PIS系统-v${VERSION_SHORT}-debug.apk

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: PIS-APK-${{ github.run_number }}
        path: ./frontend/output/*.apk
        retention-days: 30

    - name: Build Release APK
      if: github.event.inputs.release == 'true'
      run: |
        cd android
        ./gradlew assembleRelease --no-daemon
      env:
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    - name: Create Release
      if: github.event.inputs.release == 'true' && github.event.inputs.version != ''
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ github.event.inputs.version }}
        name: PIS系统 v${{ github.event.inputs.version }}
        body: |
          ## PIS系统 Android APK
          
          ### 版本信息
          - 版本号: ${{ github.event.inputs.version }}
          - 构建时间: ${{ github.event.created_at }}
          - 提交: ${{ github.sha }}
          
          ### 安装说明
          1. 下载 APK 文件
          2. 在 Android 设备上允许"未知来源"安装
          3. 安装 APK
          
          ### 注意
          - Debug 版本可以直接安装测试
          - Release 版本需要签名配置
        files: |
          ./frontend/output/*.apk
          ./frontend/android/app/build/outputs/apk/release/*.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    needs: build
    runs-on: ubuntu-latest
    if: always()
    steps:
    - name: Notify success
      if: needs.build.result == 'success'
      run: |
        echo "✅ APK 构建成功！"
        echo "📥 请在 Actions 页面下载 APK 文件"
        
    - name: Notify failure
      if: needs.build.result == 'failure'
      run: |
        echo "❌ APK 构建失败"
        echo "请检查构建日志"
