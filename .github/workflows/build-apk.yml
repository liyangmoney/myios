name: Build Android APK

on:
  push:
    branches: [ main, master ]
    paths:
      - 'frontend/**'
      - '.github/workflows/build-apk.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'frontend/**'
  workflow_dispatch:
    inputs:
      release:
        description: 'Create release?'
        required: false
        default: 'false'
      version:
        description: 'Version name (e.g., 1.0.0)'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.PAT || secrets.GITHUB_TOKEN }}
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: 'frontend/package-lock.json'

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Cache Gradle dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('frontend/android/**/*.gradle*', 'frontend/android/**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Install dependencies
      run: npm ci

    - name: Build frontend
      env:
        VITE_API_BASE_URL: ${{ secrets.API_BASE_URL || 'http://localhost:9090/api' }}
      run: npm run build

    - name: Sync Capacitor
      run: npx cap sync android

    - name: Grant execute permission for gradlew
      run: chmod +x android/gradlew

    - name: Build Debug APK
      working-directory: ./frontend/android
      run: ./gradlew assembleDebug --no-daemon

    - name: Copy APK to backend/app
      run: |
        mkdir -p ../backend/app
        cp ./android/app/build/outputs/apk/debug/app-debug.apk ../backend/app/pis-latest.apk
        ls -la ../backend/app/

    - name: Commit APK to repository
      env:
        PAT: ${{ secrets.PAT }}
      run: |
        cd ..
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add backend/app/pis-latest.apk
        git diff --staged --quiet || git commit -m "chore: update APK [skip ci]"
        if [ -n "$PAT" ]; then
          git push https://liyangmoney:${PAT}@github.com/liyangmoney/MyIOS.git
        else
          echo "PAT secret not set, skipping push"
        fi

    - name: Copy APK to output
      run: |
        mkdir -p ./output
        cp ./android/app/build/outputs/apk/debug/app-debug.apk ./output/pis-system-debug.apk

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: PIS-APK-${{ github.run_number }}
        path: ./frontend/output/*.apk
        retention-days: 30

    - name: Build Release APK
      if: github.event.inputs.release == 'true'
      working-directory: ./frontend/android
      run: ./gradlew assembleRelease --no-daemon
      env:
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

  notify:
    needs: build
    runs-on: ubuntu-latest
    if: always()
    steps:
    - name: Notify success
      if: needs.build.result == 'success'
      run: |
        echo "APK build successful!"
        echo "Download from Actions artifacts"
        
    - name: Notify failure
      if: needs.build.result == 'failure'
      run: |
        echo "APK build failed"
        echo "Check the build logs"
