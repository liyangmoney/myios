name: Build Android APK

on:
  push:
    branches: [ main, master ]
    paths:
      - 'frontend/**'
      - '.github/workflows/build-apk.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'frontend/**'
  workflow_dispatch:
    inputs:
      release:
        description: 'Create release?'
        required: false
        default: 'false'
      version:
        description: 'Version name (e.g., 1.0.0)'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.PAT || secrets.GITHUB_TOKEN }}
        fetch-depth: 0
        
    - name: Verify keystore in repo
      run: |
        echo "=== 检出后检查签名文件 ==="
        ls -la frontend/android/*.keystore 2>/dev/null || echo "frontend/android/ 中没有 keystore"
        echo ""
        echo "Git 追踪的文件:"
        git ls-files | grep keystore || echo "没有 keystore 文件被 git 追踪"
        echo ""
        echo "Git 状态:"
        git status --short | head -20
        echo "=== 检查完成 ==="

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: 'frontend/package-lock.json'

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        cmdline-tools-version: '11076708'
      continue-on-error: true
      id: setup_android

    - name: Retry Setup Android SDK
      if: steps.setup_android.outcome == 'failure'
      run: |
        echo "First attempt failed, retrying..."
        sleep 30
        
    - name: Setup Android SDK (Retry)
      if: steps.setup_android.outcome == 'failure'
      uses: android-actions/setup-android@v3
      with:
        cmdline-tools-version: '11076708'

    - name: Cache Gradle dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('frontend/android/**/*.gradle*', 'frontend/android/**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Install dependencies
      run: npm ci

    - name: Build frontend
      env:
        VITE_API_BASE_URL: ${{ secrets.API_BASE_URL || 'http://localhost:9090/api' }}
      run: npm run build

    - name: Sync Capacitor
      run: |
        npx cap sync android
        echo "检查签名配置:"
        cat android/app/build.gradle | grep -A 10 "signingConfigs" || echo "未找到 signingConfigs"
        
    - name: Setup signing config
      run: |
        echo "配置签名..."
        if [ -f "android/pis-release.keystore" ]; then
          echo "✅ 签名文件存在"
          ls -la android/pis-release.keystore
        else
          echo "❌ 签名文件不存在!"
          exit 1
        fi
        
    - name: Add signing config to build.gradle
      run: |
        echo "使用带签名的 build.gradle..."
        cp android/app/build.gradle android/app/build.gradle.bak
        cp android/app/build.gradle.signed android/app/build.gradle
        echo "✅ build.gradle 已更新为签名版本"
        
    - name: Grant execute permission for gradlew
      run: chmod +x android/gradlew

    - name: Build Release APK
      working-directory: ./frontend/android
      run: ./gradlew assembleRelease --no-daemon

    - name: Copy Release APK to backend/app
      run: |
        echo "当前目录:"
        pwd
        echo ""
        echo "查找所有 APK 文件:"
        find . -name "*.apk" -type f 2>/dev/null | head -20
        echo ""
        echo "尝试复制 Release APK:"
        mkdir -p ../backend/app
        
        # 尝试多个可能的文件名
        if [ -f "./android/app/build/outputs/apk/release/app-release.apk" ]; then
          cp ./android/app/build/outputs/apk/release/app-release.apk ../backend/app/pis-latest.apk
          echo "✅ 已复制 app-release.apk"
        elif [ -f "./android/app/build/outputs/apk/release/app-release-unsigned.apk" ]; then
          cp ./android/app/build/outputs/apk/release/app-release-unsigned.apk ../backend/app/pis-latest.apk
          echo "✅ 已复制 app-release-unsigned.apk"
        else
          echo "❌ 未找到 Release APK"
          exit 1
        fi
        
        ls -la ../backend/app/

    - name: Commit APK to repository
      env:
        PAT: ${{ secrets.PAT }}
      run: |
        cd ..
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add backend/app/pis-latest.apk
        git diff --staged --quiet || git commit -m "chore: update APK [skip ci]"
        if [ -n "$PAT" ]; then
          git push https://liyangmoney:${PAT}@github.com/liyangmoney/MyIOS.git
        else
          echo "PAT secret not set, skipping push"
        fi

  notify:
    needs: build
    runs-on: ubuntu-latest
    if: always()
    steps:
    - name: Notify success
      if: needs.build.result == 'success'
      run: |
        echo "APK build successful!"
        echo "Download from Actions artifacts"
        
    - name: Notify failure
      if: needs.build.result == 'failure'
      run: |
        echo "APK build failed"
        echo "Check the build logs"
