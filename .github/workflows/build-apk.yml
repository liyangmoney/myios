name: Build Android APK

on:
  push:
    branches: [ main, master ]
    paths:
      - 'frontend/**'
      - 'backend/config/version.js'
      - '.github/workflows/build-apk.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'frontend/**'
  workflow_dispatch:
    inputs:
      release:
        description: 'Create release?'
        required: false
        default: 'false'
      version:
        description: 'Version name (e.g., 1.0.0)'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: ./frontend

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0
        
    - name: Verify keystore in repo
      run: |
        echo "=== 检出后检查签名文件 ==="
        ls -la frontend/android/*.keystore 2>/dev/null || echo "frontend/android/ 中没有 keystore"
        echo ""
        echo "Git 追踪的文件:"
        git ls-files | grep keystore || echo "没有 keystore 文件被 git 追踪"
        echo ""
        echo "Git 状态:"
        git status --short | head -20
        echo "=== 检查完成 ==="

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: 'frontend/package-lock.json'

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        cmdline-tools-version: '11076708'
      continue-on-error: true
      id: setup_android

    - name: Retry Setup Android SDK
      if: steps.setup_android.outcome == 'failure'
      run: |
        echo "First attempt failed, retrying..."
        sleep 30
        
    - name: Setup Android SDK (Retry)
      if: steps.setup_android.outcome == 'failure'
      uses: android-actions/setup-android@v3
      with:
        cmdline-tools-version: '11076708'

    - name: Cache Gradle dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('frontend/android/**/*.gradle*', 'frontend/android/**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Sync version from backend to frontend
      run: |
        echo "=== 同步版本号 ==="
        # 从 backend/config/version.js 读取版本号
        BACKEND_VERSION=$(grep "export const version" ../backend/config/version.js | sed "s/.*'\(.*\)'.*/\1/")
        echo "Backend version: $BACKEND_VERSION"
        
        # 更新前端代码中的版本号
        sed -i "s/const CURRENT_VERSION = '.*'/const CURRENT_VERSION = '$BACKEND_VERSION'/" src/utils/appUpdate.js
        
        # 更新 android/app/build.gradle 中的版本号
        # versionName "x.x.x"
        sed -i "s/versionName \".*\"/versionName \"$BACKEND_VERSION\"/" android/app/build.gradle
        # versionCode 计算：去掉小数点，如 1.7.8 -> 10708
        VERSION_CODE=$(echo $BACKEND_VERSION | awk -F. '{printf "%d%02d%02d", $1, $2, $3}')
        sed -i "s/versionCode .*/versionCode $VERSION_CODE/" android/app/build.gradle
        
        echo "Updated build.gradle:"
        grep -E "versionCode|versionName" android/app/build.gradle
        
        # 验证更新
        FRONTEND_VERSION=$(grep "const CURRENT_VERSION" src/utils/appUpdate.js | sed "s/.*'\(.*\)'.*/\1/")
        echo "Frontend version: $FRONTEND_VERSION"
        
        if [ "$BACKEND_VERSION" = "$FRONTEND_VERSION" ]; then
          echo "✅ 版本号同步成功"
        else
          echo "❌ 版本号同步失败"
          exit 1
        fi
        echo "=== 版本同步完成 ==="

    - name: Install dependencies
      run: npm ci

    - name: Build frontend
      env:
        VITE_API_BASE_URL: ${{ secrets.API_BASE_URL || 'http://localhost:9090/api' }}
      run: npm run build

    - name: Sync Capacitor
      run: |
        npx cap sync android
        echo "检查签名配置:"
        cat android/app/build.gradle | grep -A 10 "signingConfigs" || echo "未找到 signingConfigs"
        
    - name: Setup signing config
      run: |
        echo "=== 配置签名 ==="
        echo "查找 keystore 文件:"
        find . -name "*.keystore" -type f 2>/dev/null
        echo ""
        if [ -f "android/pis-release.keystore" ]; then
          echo "✅ 找到签名文件在 android/"
          # 复制到 app 目录
          cp android/pis-release.keystore android/app/pis-release.keystore
          echo "✅ 已复制到 android/app/"
          ls -la android/app/pis-release.keystore
        elif [ -f "android/app/pis-release.keystore" ]; then
          echo "✅ 签名文件已在 app/ 目录"
          ls -la android/app/pis-release.keystore
        else
          echo "❌ 签名文件不存在!"
          exit 1
        fi
        echo "=== 签名配置完成 ==="
        
    - name: Add signing config to build.gradle
      run: |
        echo "使用带签名的 build.gradle..."
        cp android/app/build.gradle android/app/build.gradle.bak
        cp android/app/build.gradle.signed android/app/build.gradle
        echo "✅ build.gradle 已更新为签名版本"
        
    - name: Grant execute permission for gradlew
      run: chmod +x android/gradlew

    - name: Build Release APK
      working-directory: ./frontend/android
      run: ./gradlew assembleRelease --no-daemon

    - name: Copy Release APK to backend/app
      run: |
        echo "当前目录:"
        pwd
        echo ""
        echo "查找所有 APK 文件:"
        find . -name "*.apk" -type f 2>/dev/null | head -20
        echo ""
        echo "尝试复制 Release APK:"
        mkdir -p ../backend/app
        
        # 尝试多个可能的文件名
        if [ -f "./android/app/build/outputs/apk/release/app-release.apk" ]; then
          cp ./android/app/build/outputs/apk/release/app-release.apk ../backend/app/pis-latest.apk
          echo "✅ 已复制 app-release.apk"
        elif [ -f "./android/app/build/outputs/apk/release/app-release-unsigned.apk" ]; then
          cp ./android/app/build/outputs/apk/release/app-release-unsigned.apk ../backend/app/pis-latest.apk
          echo "✅ 已复制 app-release-unsigned.apk"
        else
          echo "❌ 未找到 Release APK"
          exit 1
        fi
        
        ls -la ../backend/app/

    - name: Commit APK to repository
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        cd ..
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        # 先暂存任何未提交的更改
        git stash || echo "Nothing to stash"
        # 拉取最新代码
        git pull --rebase https://liyangmoney:${GH_TOKEN}@github.com/liyangmoney/MyIOS.git main || echo "Pull failed, continuing..."
        # 恢复暂存的更改
        git stash pop || echo "Nothing to pop"
        # 添加并提交 APK
        git add backend/app/pis-latest.apk
        git diff --staged --quiet || git commit -m "chore: update APK [skip ci]"
        # 推送
        git push https://liyangmoney:${GH_TOKEN}@github.com/liyangmoney/MyIOS.git main

  notify:
    needs: build
    runs-on: ubuntu-latest
    if: always()
    steps:
    - name: Notify success
      if: needs.build.result == 'success'
      run: |
        echo "APK build successful!"
        echo "Download from Actions artifacts"
        
    - name: Notify failure
      if: needs.build.result == 'failure'
      run: |
        echo "APK build failed"
        echo "Check the build logs"
